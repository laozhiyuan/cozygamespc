<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>cozygamespc - Free Online Cozy Games for PC and Mobile</title>
    <meta
      name="description"
      content="Play cozygamespc browser games on PC and mobile. Discover action, arcade, puzzle, strategy, racing, and superhero games with fast search and friendly navigation."
    >
    <meta name="keywords" content="cozygamespc, cozy games pc, free online games, pc games, mobile browser games">
    <meta name="robots" content="index,follow">
    <link rel="canonical" href="https://cozygamespc.com/">
    <meta property="og:type" content="website">
    <meta property="og:title" content="cozygamespc - Free Online Cozy Games">
    <meta
      property="og:description"
      content="A fast, mobile-ready game portal for cozygamespc players, with online iframe games, category browsing, tags, and search."
    >
    <meta property="og:url" content="https://cozygamespc.com/">
    <meta name="theme-color" content="#007aff">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              apple: {
                blue: "#007aff",
                green: "#34c759",
                indigo: "#5856d6",
                orange: "#ff9500",
                pink: "#ff2d55",
                red: "#ff3b30",
                teal: "#30b0c7",
                gray: "#f5f5f7"
              }
            }
          }
        }
      };
    </script>
    <link rel="stylesheet" href="assets/css/styles.css">
    <script defer src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script defer src="assets/js/app.js"></script>
    <script id="structuredData" type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "cozygamespc",
        "url": "https://cozygamespc.com/",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://cozygamespc.com/search/{search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  </head>
  <body>
    <a class="skip-link" href="#app">Skip to content</a>

    <header class="topbar">
      <div class="topbar-left">
        <button class="icon-button menu-button" type="button" data-action="toggle-sidebar" aria-label="Open navigation">
          <i data-lucide="menu"></i>
        </button>
        <a class="brand" href="index.html" aria-label="cozygamespc home">
          <span class="brand-mark" aria-hidden="true">
            <span class="brand-mark-inner">CG</span>
          </span>
          <span class="brand-text">
            <strong>cozy games pc</strong>
            <small>cozygamespc</small>
          </span>
        </a>
      </div>

      <div class="search-wrap" id="searchWrap">
        <label class="sr-only" for="siteSearch">Search games and categories</label>
        <i class="search-icon" data-lucide="search"></i>
        <input
          id="siteSearch"
          class="search-input"
          type="search"
          autocomplete="off"
          placeholder="Search games and categories"
          aria-controls="searchPanel"
        >
        <button class="search-clear" type="button" data-action="clear-search" aria-label="Clear search">
          <i data-lucide="x"></i>
        </button>
        <div class="search-panel" id="searchPanel" hidden>
          <div class="search-panel-block">
            <p class="panel-label">Top categories</p>
            <div class="quick-category-grid" id="quickCategories"></div>
          </div>
          <div class="search-panel-block">
            <p class="panel-label">Suggested games</p>
            <div class="search-results" id="searchResults"></div>
          </div>
        </div>
      </div>

      <div class="top-actions">
        <button class="icon-button" type="button" data-action="share-site" aria-label="Share cozygamespc">
          <i data-lucide="share-2"></i>
        </button>
      </div>
    </header>

    <aside class="sidebar" id="sidebar" aria-label="Main navigation">
      <nav class="sidebar-nav">
        <a class="nav-link" href="index.html" data-nav="home">
          <span class="nav-icon"><i data-lucide="home"></i></span>
          <span class="nav-text">Home</span>
        </a>
        <a class="nav-link" href="index.html?route=/recently-played" data-nav="recent">
          <span class="nav-icon"><i data-lucide="clock-3"></i></span>
          <span class="nav-text">Recently Played</span>
        </a>
        <a class="nav-link" href="index.html?route=/new-games" data-nav="latest">
          <span class="nav-icon"><i data-lucide="sparkles"></i></span>
          <span class="nav-text">New Games</span>
        </a>
        <a class="nav-link" href="index.html?route=/popular-games" data-nav="popular">
          <span class="nav-icon"><i data-lucide="flame"></i></span>
          <span class="nav-text">Popular Games</span>
        </a>

        <div class="nav-divider"></div>
        <p class="sidebar-label">Game Categories</p>
        <div id="categoryLinks"></div>

        <div class="nav-divider"></div>
        <p class="sidebar-label">Tags</p>
        <div id="tagLinks"></div>
      </nav>
    </aside>

    <main id="app" class="main-content" tabindex="-1"></main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
  </body>
</html>
